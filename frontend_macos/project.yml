name: SplitVPN
options:
  bundleIdPrefix: com.splitvpn
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Z3PM3LR5FF"

schemes:
  SplitVPN:
    build:
      targets:
        SplitVPN: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  SplitVPN:
    type: application
    platform: macOS
    sources:
      - path: SplitVPN
      - path: Shared
    dependencies:
      - package: GRDB
      - target: PacketTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitvpn.app
        INFOPLIST_FILE: SplitVPN/Info.plist
        CODE_SIGN_ENTITLEMENTS: SplitVPN/SplitVPN.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"

  PacketTunnel:
    type: app-extension
    platform: macOS
    sources:
      - path: PacketTunnel
        excludes:
          - Resources/blocked.srs
          - Resources/blocked-ip.srs
      - path: PacketTunnel/Resources/blocked.srs
        buildPhase: resources
      - path: PacketTunnel/Resources/blocked-ip.srs
        buildPhase: resources
      - path: Shared
    dependencies:
      - package: GRDB
      # Libbox — статическая библиотека: только линкуем, НЕ встраиваем.
      - framework: Vendor/Libbox.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitvpn.app.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        OTHER_LDFLAGS: ["-lresolv"]
        ENABLE_HARDENED_RUNTIME: "YES"
